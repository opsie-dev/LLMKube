                      The UID to run the entrypoint of the container process.
                      Defaults to user specified in image metadata if unspecified.
                      May also be set in PodSecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  seLinuxOptions:
                    description: |-
                      The SELinux context to be applied to the container.
                      If unspecified, the container runtime will allocate a random SELinux context for each
                      container.  May also be set in PodSecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      level:
                        description: Level is SELinux level label that applies to
                          the container.
                        type: string
                      role:
                        description: Role is a SELinux role label that applies to
                          the container.
                        type: string
                      type:
                        description: Type is a SELinux type label that applies to
                          the container.
                        type: string
                      user:
                        description: User is a SELinux user label that applies to
                          the container.
                        type: string
                    type: object
                  seccompProfile:
                    description: |-
                      The seccomp options to use by this container. If seccomp options are
                      provided at both the pod & container level, the container options
                      override the pod options.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      localhostProfile:
                        description: |-
                          localhostProfile indicates a profile defined in a file on the node should be used.
                          The profile must be preconfigured on the node to work.
                          Must be a descending path, relative to the kubelet's configured seccomp profile location.
                          Must be set if type is "Localhost". Must NOT be set for any other type.
                        type: string
                      type:
                        description: |-
                          type indicates which kind of seccomp profile will be applied.
                          Valid options are:

                          Localhost - a profile defined in a file on the node should be used.
                          RuntimeDefault - the container runtime default profile should be used.
                          Unconfined - no profile should be applied.
                        type: string
                    required:
                    - type
                    type: object
                  windowsOptions:
                    description: |-
                      The Windows specific settings applied to all containers.
                      If unspecified, the options from the PodSecurityContext will be used.
                      If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is linux.
                    properties:
                      gmsaCredentialSpec:
                        description: |-
                          GMSACredentialSpec is where the GMSA admission webhook
                          (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
                          GMSA credential spec named by the GMSACredentialSpecName field.
                        type: string
                      gmsaCredentialSpecName:
                        description: GMSACredentialSpecName is the name of the GMSA
                          credential spec to use.
                        type: string
                      hostProcess:
                        description: |-
                          HostProcess determines if a container should be run as a 'Host Process' container.
                          All of a Pod's containers must have the same effective HostProcess value
                          (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
                          In addition, if HostProcess is true then HostNetwork must also be set to true.
                        type: boolean
                      runAsUserName:
                        description: |-
                          The UserName in Windows to run the entrypoint of the container process.
                          Defaults to the user specified in image metadata if unspecified.
                          May also be set in PodSecurityContext. If set in both SecurityContext and
                          PodSecurityContext, the value specified in SecurityContext takes precedence.
                        type: string
                    type: object
                type: object
              skipModelInit:
                description: |-
                  SkipModelInit disables the model-downloader init container.
                  Use when the model is baked into the image or downloaded by the
                  container itself (e.g., via HF_TOKEN).
                type: boolean
              tensorOverrides:
                description: |-
                  TensorOverrides provides fine-grained tensor placement overrides for power users.
                  Each entry specifies a tensor name and target device (e.g., "exps=CPU", "token_embd=CUDA0").
                  Maps to llama.cpp --override-tensor flag (one flag per entry).
                items:
                  type: string
                type: array
              tgiConfig:
                description: |-
                  TGIConfig holds configuration for the TGI runtime.
                  Only used when Runtime is "tgi".
                properties:
                  dtype:
                    description: Dtype sets the model data type (float16, bfloat16).
                    enum:
                    - float16
                    - bfloat16
                    type: string
                  hfTokenSecretRef:
                    description: HFTokenSecretRef references a Secret containing the
                      HuggingFace token.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                  maxInputLength:
                    description: MaxInputLength sets the maximum input token length.
                    format: int32
                    type: integer
                  maxTotalTokens:
                    description: MaxTotalTokens sets the maximum total tokens (input
                      + output).
                    format: int32
                    type: integer
                  quantize:
                    description: Quantize sets the quantization method (bitsandbytes,
                      gptq, awq, eetq).
                    enum:
                    - bitsandbytes
                    - gptq
                    - awq
                    - eetq
                    type: string
                type: object
              tolerations:
                description: Tolerations for pod scheduling (e.g., GPU taints, spot
                  instances)
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
              uBatchSize:
                description: |-
                  UBatchSize sets the micro-batch size for decoding.
                  Smaller micro-batches reduce memory usage during generation.
                  Maps to llama.cpp --ubatch-size flag.
                format: int32
                minimum: 1
                type: integer
              vllmConfig:
                description: |-
                  VLLMConfig holds configuration for the vLLM runtime.
                  Only used when Runtime is "vllm".
                properties:
                  attentionBackend:
                    description: |-
                      AttentionBackend selects the attention implementation used by vLLM.
                      FLASHINFER is typically fastest on recent NVIDIA GPUs (especially Blackwell);
                      FLASH_ATTN is a solid default; XFORMERS and torch_sdpa are portability
                      fallbacks. Requires a vLLM version that supports the chosen backend.
                      Both uppercase (vLLM's native form) and lowercase spellings are accepted
                      for backwards compatibility with earlier LLMKube releases.
                      Maps to vLLM --attention-backend flag.
                    enum:
                    - FLASH_ATTN
                    - FLASHINFER
                    - XFORMERS
                    - flashinfer
                    - flash_attn
                    - xformers
                    - torch_sdpa
                    type: string
                  cpuOffloadGB:
                    description: |-
                      CPUOffloadGb increases the GPU memory size. When set, passes
                      --cpu-offload-gb to vLLM. Per-rank, so 4 on TP=2 means 4 GB of
                      CPU RAM per GPU. Use when FP8 model weights don't fit VRAM.
                      Throughput hit is 2-5x on the offloaded path.
                    format: int32
                    minimum: 0
                    type: integer
                  dtype:
                    description: Dtype sets the model data type (auto, float16, bfloat16).
                    enum:
                    - auto
                    - float16
                    - bfloat16
                    type: string
                  enableChunkedPrefill:
                    description: |-
                      EnableChunkedPrefill interleaves long prefills with decode steps so a
                      large paste (e.g. a 32K-token file) does not starve concurrent decode
                      streams. Only emitted when explicitly set to true.
                      Maps to vLLM --enable-chunked-prefill flag.
                    type: boolean
                  enableExpertParallel:
                    description: |-
                      EnableExpertParallel distributes MoE experts across tensor-parallel ranks
                      instead of replicating them. Only meaningful for MoE models.
                      Maps to vLLM --enable-expert-parallel flag.
                    type: boolean
                  enablePrefixCaching:
                    description: |-
                      EnablePrefixCaching turns on vLLM's automatic prefix caching for repeated prompts.
                      Significantly reduces time-to-first-token for conversational and agentic workloads
                      where requests share a common system prompt.
                      Only emitted when explicitly set to true — when nil or false, vLLM's own
                      default is used (do not emit the flag).
                      Maps to vLLM --enable-prefix-caching flag.
                    type: boolean
                  gpuMemoryUtilization:
                    description: |-
                      GPUMemoryUtilization controls how much GPU memory each stage can use.
                      When set, passes --gpu-memory-utilization to vLLM. Range from 0.1 - 0.99
                      and default unset (vLLM uses 0.90).
                    maximum: 0.99
                    minimum: 0.1
                    type: number
                  hfTokenSecretRef:
                    description: HFTokenSecretRef references a Secret containing the
                      HuggingFace token.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                  kvCacheCustomDtype:
                    description: |-
                      KVCacheCustomDtype sets a custom vLLM KV cache element type that is not
                      in the standard enum. Used for vLLM versions with additional cache
                      formats such as TurboQuant 2-bit (turbo2, shipped in v0.20.0). Maps to
                      vLLM --kv-cache-dtype. The runtime image must understand the value or
                      vLLM will fail to start; LLMKube does not validate the string. Mirrors
                      the llama.cpp-side CacheTypeCustomK/V escape hatch.
                      Takes precedence over KVCacheDtype when both are set.
                    type: string
                  kvCacheDtype:
                    default: auto
                    description: |-
                      KVCacheDtype selects the KV cache element type. fp8_e5m2 and fp8_e4m3 cut
                      KV cache memory roughly in half versus auto (which follows dtype), which
                      is what unlocks 128K+ context on consumer VRAM for agentic workloads.
                      Maps to vLLM --kv-cache-dtype flag.
                      For custom build types not in the enum (e.g. TurboQuant turbo2 from
                      vLLM v0.20+), use KVCacheCustomDtype instead.
                    enum:
                    - auto
                    - fp8_e5m2
                    - fp8_e4m3
                    type: string
                  maxModelLen:
                    description: MaxModelLen sets the maximum model context length.
                    format: int32
                    type: integer
                  maxNumBatchedTokens:
                    description: |-
                      MaxNumBatchedTokens sets the maximum number of tokens batched together
                      per step. This is the main throughput knob: too low means prefill-bound,
                      too high risks OOM on long context. No default — only emitted when set.
                      Maps to vLLM --max-num-batched-tokens flag.
                    format: int32
                    minimum: 512
                    type: integer
                  quantization:
                    description: |-
                      Quantization method.
                      awq, gptq, squeezellm are classic 4-bit formats. fp8 targets 8-bit FP
                      checkpoints (Qwen FP8, Llama FP8, etc.). nvfp4 is NVIDIA's Blackwell-native
                      4-bit format. compressed-tensors is the neuralmagic/vLLM cross-format
                      loader used by Unsloth and other recent releases.
                    enum:
                    - awq
                    - gptq
                    - squeezellm
                    - fp8
                    - nvfp4
                    - compressed-tensors
                    type: string
                  speculative:
                    description: |-
                      Speculative enables draft-model speculative decoding. On single-stream
                      agentic workloads this can be 30-60% faster than plain tensor-parallel
                      execution. Requires a second (smaller) Model CR to act as the draft.
                    properties:
                      enabled:
                        description: |-
                          Enabled toggles speculative decoding on. When false or nil, no
                          speculative flags are emitted regardless of other fields.
                        type: boolean
                      model:
                        description: |-
                          Model references the Model CR (in the same namespace as the
                          InferenceService) to use as the speculative draft model.
                          Required when Enabled is true. If missing, speculative decoding is
                          skipped and the InferenceService surfaces a SpeculativeInvalid
                          status condition rather than failing the reconcile.
                          Maps to vLLM --speculative-model flag.
                        type: string
                      numSpeculativeTokens:
                        default: 4
                        description: |-
                          NumSpeculativeTokens is the number of draft tokens proposed per step.
                          Typical sweet spot is 3-5; higher values increase wasted work when the
                          draft disagrees with the target model.
                          Maps to vLLM --num-speculative-tokens flag.
                        format: int32
                        maximum: 16
                        minimum: 1
                        type: integer
                    type: object
                  tensorParallelSize:
                    description: TensorParallelSize sets the number of GPUs for tensor
                      parallelism.
                    format: int32
                    type: integer
                type: object
            required:
            - modelRef
            type: object
          status:
            description: status defines the observed state of InferenceService
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the InferenceService resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              desiredReplicas:
                description: DesiredReplicas is the desired number of replicas
                format: int32
                type: integer
              effectivePriority:
                description: EffectivePriority shows the resolved priority value from
                  the applied PriorityClass
                format: int32
                type: integer
              endpoint:
                description: Endpoint is the service URL where inference requests
                  can be sent
                type: string
              lastUpdated:
                description: LastUpdated is the timestamp of the last status update
                format: date-time
                type: string
              modelReady:
                description: ModelReady indicates if the referenced Model is in Ready
                  state
                type: boolean
              phase:
                description: |-
                  Phase represents the current lifecycle phase of the InferenceService.
                  Possible values: Pending, Creating, Progressing, Ready, WaitingForGPU, Failed.
                enum:
                - Pending
                - Creating
                - Progressing
                - Ready
                - WaitingForGPU
                - Failed
                type: string
              queuePosition:
                description: QueuePosition indicates position among pending InferenceServices
                  cluster-wide (0 = not queued)
                format: int32
                type: integer
              readyReplicas:
                description: Replicas tracks the number of ready vs desired pods
                format: int32
                type: integer
              schedulingMessage:
                description: SchedulingMessage provides details about scheduling issues
                type: string
              schedulingStatus:
                description: SchedulingStatus indicates why pods cannot be scheduled
                  (e.g., "InsufficientGPU")
                type: string
              waitingFor:
                description: 'WaitingFor describes the resource constraint (e.g.,
                  "nvidia.com/gpu: 1")'
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}

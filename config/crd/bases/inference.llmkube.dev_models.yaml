---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: models.inference.llmkube.dev
spec:
  group: inference.llmkube.dev
  names:
    kind: Model
    listKind: ModelList
    plural: models
    shortNames:
    - mdl
    singular: model
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.size
      name: Size
      type: string
    - jsonPath: .spec.hardware.accelerator
      name: Accelerator
      type: string
    - jsonPath: .status.gguf.architecture
      name: Arch
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Model is the Schema for the models API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Model
            properties:
              format:
                default: gguf
                description: |-
                  Format specifies the model file format.
                  "gguf" is used with the llama-server runtime; "mlx" is used with the oMLX runtime;
                  "safetensors", "pytorch", and "custom" are used with the generic runtime.
                enum:
                - gguf
                - mlx
                - safetensors
                - pytorch
                - custom
                type: string
              hardware:
                description: Hardware specifies hardware acceleration preferences
                properties:
                  accelerator:
                    default: cpu
                    description: Accelerator specifies the type of hardware acceleration
                    enum:
                    - cpu
                    - metal
                    - cuda
                    - rocm
                    type: string
                  gpu:
                    description: GPU specifies GPU device requirements
                    properties:
                      count:
                        description: |-
                          Count specifies the number of GPUs required
                          Supports multi-GPU for model sharding (future feature)
                        format: int32
                        maximum: 8
                        minimum: 0
                        type: integer
                      enabled:
                        description: Enabled indicates whether GPU acceleration is
                          enabled
                        type: boolean
                      layers:
                        description: |-
                          Layers specifies layer offloading configuration for multi-GPU
                          Format: number of layers to offload to GPU (e.g., 32 for full offload on 7B model)
                          -1 means auto-detect optimal layer split
                        format: int32
                        minimum: -1
                        type: integer
                      memory:
                        description: Memory specifies minimum GPU memory required
                          per GPU (e.g., "8Gi", "16Gi")
                        type: string
                      sharding:
                        description: |-
                          Sharding defines how to shard the model across multiple GPUs
                          Only applicable when Count > 1
                        properties:
                          layerSplit:
                            description: |-
                              LayerSplit defines custom layer splits per GPU
                              Example: [0-15, 16-31] for 2-GPU split of 32-layer model
                              If empty, auto-calculate even split
                            items:
                              type: string
                            type: array
                          strategy:
                            default: layer
                            description: |-
                              Strategy defines the sharding approach for multi-GPU model execution.
                              - "layer" (default): shard by transformer layers. llama.cpp --split-mode layer.
                              - "tensor" (alias: "row"): true tensor parallelism. llama.cpp --split-mode row.
                                Splits each tensor operation across GPUs rather than assigning whole layers
                                to each. Performance varies by workload; typically better on compute-bound ops.
                              - "none": disable multi-GPU sharding (single GPU). llama.cpp --split-mode none.
                              - "pipeline": accepted for forward compatibility but currently falls back to
                                "layer" with a reconciler warning; llama.cpp has no pipeline split-mode.
                            enum:
                            - layer
                            - tensor
                            - row
                            - pipeline
                            - none
                            type: string
                        type: object
                      vendor:
                        default: nvidia
                        description: |-
                          Vendor specifies GPU vendor preference (nvidia, amd, intel)
                          Future-proof for multi-vendor support
                        enum:
                        - nvidia
                        - amd
                        - intel
                        type: string
                    type: object
                  memoryBudget:
                    description: |-
                      MemoryBudget is an absolute memory limit for the model process
                      (e.g., "24Gi", "8192Mi"). When set, it takes precedence over
                      MemoryFraction and the agent-level --memory-fraction flag.
                      Parsed via resource.ParseQuantity().
                    type: string
                  memoryFraction:
                    description: |-
                      MemoryFraction is the fraction of total system memory to budget for
                      this model's inference process (0.0–1.0). Takes precedence over the
                      agent-level --memory-fraction flag but not MemoryBudget.
                    type: number
                type: object
              quantization:
                description: Quantization describes the quantization level (e.g.,
                  Q4_0, Q5_K_M, F16)
                type: string
              resources:
                description: Resources defines resource requirements for running the
                  model
                properties:
                  cpu:
                    description: CPU specifies CPU requirements (e.g., "2" or "2000m")
                    type: string
                  memory:
                    description: Memory specifies memory requirements (e.g., "4Gi")
                    type: string
                type: object
              sha256:
                description: |-
                  SHA256 is the expected SHA256 hash of the model file for integrity verification.
                  When set, the controller verifies the downloaded/copied file matches this hash.
                pattern: ^[a-fA-F0-9]{64}$
                type: string
              source:
                description: |-
                  Source defines where to obtain the model.
                  For GGUF models: URL or path to a .gguf file.
                  For MLX models: local directory path containing the model (config.json, weights).
                  Supported schemes: http://, https://, file://, pvc://, or absolute paths.
                  Examples:
                    - https://huggingface.co/org/repo/resolve/main/model.gguf
                    - file:///mnt/models/model.gguf
                    - /mnt/models/model.gguf (air-gapped deployments)
                    - pvc://my-models-pvc/path/to/model.gguf (pre-staged on a PersistentVolumeClaim)
                    - /mnt/models/Llama-3.2-3B-Instruct-4bit (MLX model directory)
                pattern: ^(https?|file|pvc)://.*|^/[^\s]+$|^[a-zA-Z0-9][\w\-\.\/]+$
                type: string
            required:
            - source
            type: object
          status:
            description: status defines the observed state of Model
            properties:
              acceleratorReady:
                description: AcceleratorReady indicates if hardware acceleration is
                  configured and ready
                type: boolean
              cacheKey:
                description: |-
                  CacheKey is the SHA256 hash prefix of the source URL used for cache storage
                  Models with the same source URL share the same cache entry
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the Model resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the model is downloaded and ready for use
                  - "Progressing": the model is being downloaded or processed
                  - "Degraded": the model download or setup failed

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              gguf:
                description: GGUF contains metadata extracted from the GGUF file header
                properties:
                  architecture:
                    description: Architecture is the model architecture (e.g., "llama",
                      "mistral", "phi")
                    type: string
                  contextLength:
                    description: ContextLength is the maximum context length (tokens)
                    format: int64
                    type: integer
                  embeddingSize:
                    description: EmbeddingSize is the embedding dimension size
                    format: int64
                    type: integer
                  fileVersion:
                    description: FileVersion is the GGUF file format version
                    format: int32
                    type: integer
                  headCount:
                    description: HeadCount is the number of attention heads
                    format: int64
                    type: integer
                  layerCount:
                    description: LayerCount is the number of transformer layers/blocks
                    format: int64
                    type: integer
                  license:
                    description: License is the license identifier extracted from
                      the GGUF file metadata
                    type: string
                  modelName:
                    description: ModelName is the model name as stored in the GGUF
                      file
                    type: string
                  quantization:
                    description: Quantization is the quantization type (e.g., "Q4_K_M",
                      "Q5_K_M")
                    type: string
                  tensorCount:
                    description: TensorCount is the number of tensors in the model
                    format: int64
                    type: integer
                type: object
              lastUpdated:
                description: LastUpdated is the timestamp of the last status update
                format: date-time
                type: string
              path:
                description: Path represents the local path where the model is stored
                type: string
              phase:
                description: |-
                  Phase represents the current lifecycle phase of the model
                  Possible values: Pending, Downloading, Ready, Failed
                type: string
              sha256:
                description: |-
                  SHA256 is the computed SHA256 hash of the model file.
                  Populated after download/copy for integrity tracking.
                type: string
              size:
                description: Size represents the size of the downloaded model file
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

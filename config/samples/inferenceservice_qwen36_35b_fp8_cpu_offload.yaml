---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-6-35b-a3b-fp8
  namespace: default
spec:
  source: "https://huggingface.co/Qwen/Qwen3.6-35B-A3B-FP8"
  format: safetensors
  quantization: fp8
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 2
      vendor: nvidia
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-6-35b-a3b-fp8
  namespace: default
spec:
  modelRef: qwen3-6-35b-a3b-fp8
  runtime: vllm
  image: vllm/vllm-openai:v0.20.0
  replicas: 1
  vllmConfig:
    hfTokenSecretRef:
      name: hf-token
      key: HF_TOKEN
    # Qwen3.6-35B-A3B-FP8 on 2x 5060 Ti needs ~18 GB/shard 
    # `--cpu-offload-gb 4` per rank makes it fit at a throughput .
    cpuOffloadGB: 4
    # On tight setups raising it to 0.95-0.97 buys the headroom
    # needed for profile-run + cudagraph capture.
    gpuMemoryUtilization: 0.95
    maxNumBatchedTokens: 4096
    maxModelLen: 32768
    quantization: fp8
    tensorParallelSize: 8
  endpoint:
    port: 8000
    type: ClusterIP
  resources:
    gpu: 2
    cpu: "8"
    memory: "32Gi"
